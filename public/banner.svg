<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0e17"/>
      <stop offset="0.5" stop-color="#151d2e"/>
      <stop offset="1" stop-color="#0a0e17"/>
    </linearGradient>
    <linearGradient id="holo" x1="0" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00e5ff"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#00e5ff"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="0.25" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00e5ff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violetGlow" cx="0.85" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#00e5ff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="400" fill="url(#bg)"/>
  <rect width="1280" height="400" fill="url(#grid)"/>
  <rect width="1280" height="400" fill="url(#cyanGlow)"/>
  <rect width="1280" height="400" fill="url(#violetGlow)"/>

  <rect x="0" y="0" width="1280" height="3" fill="url(#holo)"/>
  <rect x="0" y="397" width="1280" height="3" fill="url(#holo)"/>

  <!-- Corner brackets for that terminal OS feel -->
  <g stroke="#00e5ff" stroke-width="2" fill="none" opacity="0.5">
    <polyline points="24,24 24,12 36,12"/>
    <polyline points="1256,24 1256,12 1244,12"/>
    <polyline points="24,376 24,388 36,388"/>
    <polyline points="1256,376 1256,388 1244,388"/>
  </g>

  <g font-family="JetBrains Mono, Menlo, Consolas, ui-monospace, monospace">
    <text x="60" y="92" fill="#64748b" font-size="14" letter-spacing="6">AUTONOMOUS MEME COIN OPERATING SYSTEM</text>
    <text x="60" y="220" fill="url(#title)" font-size="140" font-weight="800" letter-spacing="-4">MemeOS</text>
    <text x="60" y="282" fill="#e2e8f0" font-size="26" font-weight="500">One prompt. Real on-chain empire. Under 3 minutes.</text>
    <g transform="translate(60 324)" font-size="13" letter-spacing="3" fill="#475569">
      <text x="0" y="0">CLAUDE SONNET</text>
      <text x="160" y="0">×</text>
      <text x="180" y="0">FOUR.MEME</text>
      <text x="312" y="0">×</text>
      <text x="332" y="0">BITQUERY</text>
      <text x="448" y="0">×</text>
      <text x="468" y="0">BSC</text>
    </g>
  </g>

  <!-- Right side: minimalist terminal block -->
  <g transform="translate(820 100)">
    <rect x="0" y="0" width="400" height="200" rx="10" fill="#0f1520" stroke="#1e293b" stroke-width="1"/>
    <circle cx="16" cy="18" r="4" fill="#ef4444" opacity="0.7"/>
    <circle cx="30" cy="18" r="4" fill="#f59e0b" opacity="0.7"/>
    <circle cx="44" cy="18" r="4" fill="#10b981" opacity="0.7"/>
    <text x="64" y="22" font-family="JetBrains Mono, monospace" font-size="10" fill="#475569" letter-spacing="2">VIBE TERMINAL</text>

    <g font-family="JetBrains Mono, monospace" font-size="14">
      <text x="18" y="68" fill="#00e5ff">&gt; aggressive cyber-duck,</text>
      <text x="18" y="92" fill="#00e5ff">  glitch energy, chaos</text>

      <text x="18" y="134" fill="#64748b">// Market Analyst   </text>
      <text x="230" y="134" fill="#10b981">DONE</text>
      <text x="18" y="154" fill="#64748b">// Concept Architect</text>
      <text x="230" y="154" fill="#10b981">DONE</text>
      <text x="18" y="174" fill="#64748b">// Visual Director  </text>
      <text x="230" y="174" fill="#00e5ff">RUNNING</text>
    </g>
  </g>
</svg>
